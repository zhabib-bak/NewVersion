name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_pass
          MYSQL_DATABASE: tickets_ci
          MYSQL_USER: ci_user
          MYSQL_PASSWORD: ci_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u ci_user -pci_pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: node --check server.mjs app.js
      - name: Smoke test
        run: node scripts/smoke-test.mjs
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: tickets_ci
          DB_USER: ci_user
          DB_PASS: ci_pass
