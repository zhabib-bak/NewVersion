services:
  - type: web
    name: ticket-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /tmp/data
      - key: SESSION_DURATION_HOURS
        value: "12"
      - key: TICKET_APP_DEFAULT_PASSWORD
        value: Qwer1234..
      - key: SEED_FORCE_RESET
        value: "false"
      - key: DB_TYPE
        value: mysql
      - key: DB_HOST
        value: sql7.freesqldatabase.com
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: sql7825288
      - key: DB_USER
        value: sql7825288
      - key: DB_PASS
        value: qS3KmP6hR1
      - key: JWT_SECRET
        value: 2fd84125f36d0e74653be1fc65e0de0
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
