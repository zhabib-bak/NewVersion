# Fly.io configuration — https://fly.io/docs/reference/configuration/
# Replace "ticket-tracker-XXXX" with your unique app name from `fly launch`
app = "ticket-tracker-XXXX"
primary_region = "mad"

[build]

[env]
  NODE_ENV        = "production"
  DATA_DIR        = "/app/data"
  PORT            = "3000"
  SEED_FORCE_RESET = "false"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "256mb"

[[mounts]]
  source      = "ticket_data"
  destination = "/app/data"
  initial_size = "1gb"
